<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Snake</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game">
    <h1>Simple Snake</h1>
    <p class="help">Arrow keys / WASD to move · Space to restart</p>

    <div class="hud">
      <span>Score: <strong id="score">0</strong></span>
      <span>Best: <strong id="best">0</strong></span>
    </div>

    <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
    <p id="status" class="status">Press a direction key to start.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
