<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Snake</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Simple Snake</h1>
    <p class="help">Use arrow keys or WASD to move. Every 5 snacks unlocks a portal pair. Press Space to restart after game over.</p>
    <div class="hud">
      <span>Score: <strong id="score">0</strong></span>
      <span>Best: <strong id="best">0</strong></span>
      <span>Portals: <strong id="portals">0</strong></span>
    </div>
    <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
    <p id="status" class="status">Press any movement key to start.</p>
  </main>
  <script src="script.js"></script>
</body>
</html>
